name: Publish Plugin

on:
  issues:
    types: [labeled, edited]

concurrency:
  group: publish-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  publish:
    if: |
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'Publish') &&
      (github.event.action == 'edited' || github.event.label.name == 'Publish')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install rjsmin

      - name: Run Publish Bot
        id: bot
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SUBMITTER: ${{ github.event.issue.user.login }}
        run: python .github/scripts/publish_bot.py

      - name: Create Pull Request
        if: steps.bot.outputs.script_id != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: publish ${{ steps.bot.outputs.script_id }} v${{ steps.bot.outputs.version }} from issue #${{ github.event.issue.number }}"
          branch: "publish/issue-${{ github.event.issue.number }}"
          title: "自动发布: ${{ github.event.issue.title }}"
          body: |
            ## 自动化脚本发布
            此 PR 由 Issue #${{ github.event.issue.number }} 自动生成。
            - 发布者 GitHub 账号：`${{ github.event.issue.user.login }}`
            - 脚本 ID：`${{ steps.bot.outputs.script_id }}`
            - 版本：`${{ steps.bot.outputs.version }}`

            **请仓库管理员检查代码变动，确认无误后合并。**

            Closes #${{ github.event.issue.number }}
          labels: automated-pr
          delete-branch: true

      - name: Comment Success
        if: success() && steps.bot.outputs.script_id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: "自动化打包成功！已生成 Pull Request 供仓库主审核，合并后即可生效。"

      - name: Comment Failure
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: "自动化打包失败，请检查脚本文件是否包含 MODULE_ID / MODULE_VERSION 常量。详细报错请查看 Actions 日志。"
