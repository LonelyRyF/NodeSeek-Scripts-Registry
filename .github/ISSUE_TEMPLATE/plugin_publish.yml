name: 发布新脚本
description: 填写信息并上传文件，自动提交 PR 发布脚本
title: "Publish: {plugin_name}"
labels: ["Publish"]
body:
  - type: input
    id: plugin_name
    attributes:
      label: 插件名称
      placeholder: e.g. 盘古排版助手
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: 作者名
      placeholder: e.g. 浅霖
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 插件主要作用
      placeholder: e.g. 自动在中英文之间添加空格
    validations:
      required: true

  - type: textarea
    id: file_upload
    attributes:
      label: 脚本文件
      placeholder: 将文件拖拽至此...
    validations:
      required: true
