name: 发布/更新子脚本
description: 填写信息并上传文件，自动提交 PR 更新云端脚本库
title: "Publish: {name}"
labels: ["Publish"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交脚本！请填写下方信息并将 `.user.js` 文件拖入底部的上传框。
        机器人会自动从脚本中解析 ID、版本号、简述，无需手动填写。
        等待仓库主审核 PR 后即可上线。

  - type: input
    id: name
    attributes:
      label: 脚本名称
      description: 显示在脚本市场中的友好名称
      placeholder: e.g. 隐私保护助手
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: 作者名
      description: 你的名字或昵称，将显示在脚本市场中
      placeholder: e.g. 浅霖
    validations:
      required: true

  - type: textarea
    id: file_upload
    attributes:
      label: 脚本文件
      description: 请将您的 `.user.js` 文件直接拖拽到下方输入框中上传
      placeholder: 将文件拖拽至此...
    validations:
      required: true
